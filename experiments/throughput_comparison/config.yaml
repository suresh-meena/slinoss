experiment:
  name: "throughput_comparison"
  output_root: "experiments/throughput_comparison/runs"
  seed: 7
  warmup_steps: 5
  measure_steps: 20
  torch_device: "cuda"
  torch_dtype: "fp32"
  jax_platform: "gpu"
  jax_dtype: "float32"
  allow_tf32: true
  optimizer:
    lr: 3.0e-4
    weight_decay: 0.05

defaults:
  batch_size: 16
  seq_len: 1024
  input_dim: 96
  output_dim: 96
  hidden_dim: 256
  layers: 4
  state_dim: 64
  expand: 2
  d_conv: 4
  d_head: 32
  chunk_size: 64

models:
  slinoss:
    family: "slinoss"
    backend: "auto"
    normalize_bc: true
  mamba2:
    family: "mamba2"
    expand: 2
    d_conv: 4
  linoss:
    family: "damped_linoss"
    layer_name: "IMEX"
    initialization: "ring"
    r_min: 0.9
    r_max: 1.0
    theta_min: 0.0
    theta_max: 3.141592653589793
    A_min: 0.0
    A_max: 1.0
    G_min: 0.0
    G_max: 1.0
    dt_std: 0.5
    drop_rate: 0.0
  dlinoss:
    family: "damped_linoss"
    layer_name: "DampedIMEX1"
    initialization: "ring"
    r_min: 0.9
    r_max: 1.0
    theta_min: 0.0
    theta_max: 3.141592653589793
    A_min: 0.0
    A_max: 1.0
    G_min: 0.0
    G_max: 1.0
    dt_std: 0.5
    drop_rate: 0.0

cases:
  - name: "default"
    suite: "overview"
    description: "Balanced steady-state comparison point."

  - name: "latency_b1"
    suite: "batch_size"
    description: "Small-batch latency-sensitive setting."
    sweep_key: "batch_size"
    sweep_value: 1
    batch_size: 1

  - name: "batch_b4"
    suite: "batch_size"
    description: "Moderate batch throughput sweep."
    sweep_key: "batch_size"
    sweep_value: 4
    batch_size: 4

  - name: "batch_b16"
    suite: "batch_size"
    description: "Default batch throughput sweep."
    sweep_key: "batch_size"
    sweep_value: 16
    batch_size: 16

  - name: "throughput_b64"
    suite: "batch_size"
    description: "Large-batch saturation case."
    sweep_key: "batch_size"
    sweep_value: 64
    batch_size: 64

  - name: "seq_256"
    suite: "sequence_length"
    description: "Short-context scaling point."
    sweep_key: "seq_len"
    sweep_value: 256
    seq_len: 256
    chunk_size: 64

  - name: "seq_512"
    suite: "sequence_length"
    description: "Mid-context scaling point."
    sweep_key: "seq_len"
    sweep_value: 512
    seq_len: 512
    chunk_size: 64

  - name: "seq_1024"
    suite: "sequence_length"
    description: "Default context scaling point."
    sweep_key: "seq_len"
    sweep_value: 1024
    seq_len: 1024
    chunk_size: 64

  - name: "seq_2048"
    suite: "sequence_length"
    description: "Long-context scaling point."
    sweep_key: "seq_len"
    sweep_value: 2048
    seq_len: 2048
    chunk_size: 128

  - name: "width_192"
    suite: "hidden_dim"
    description: "Narrower-width scaling point."
    sweep_key: "hidden_dim"
    sweep_value: 192
    hidden_dim: 192
    d_head: 32

  - name: "width_256"
    suite: "hidden_dim"
    description: "Default width scaling point."
    sweep_key: "hidden_dim"
    sweep_value: 256
    hidden_dim: 256
    d_head: 32

  - name: "width_384"
    suite: "hidden_dim"
    description: "Wider-width scaling point."
    sweep_key: "hidden_dim"
    sweep_value: 384
    hidden_dim: 384
    d_head: 48

  - name: "depth_2"
    suite: "layers"
    description: "Shallower stack scaling point."
    sweep_key: "layers"
    sweep_value: 2
    layers: 2

  - name: "depth_4"
    suite: "layers"
    description: "Default stack depth scaling point."
    sweep_key: "layers"
    sweep_value: 4
    layers: 4

  - name: "depth_8"
    suite: "layers"
    description: "Deeper stack scaling point."
    sweep_key: "layers"
    sweep_value: 8
    layers: 8
