# PPG-DaLiA Experiment Configuration

# Dataset settings
data_root: "experiments/PPG_DaLiA/data"
include_time: false
x_window: 49920
x_hop: 4992
target_mode: "mean"

# Training settings
seed: 7
epochs: 50
batch_size: 8
num_workers: 0
lr: 0.001
weight_decay: 0.05
grad_clip: 1.0

# Model architecture
d_model: 64
n_layers: 4
d_state: 64
expand: 2
d_head: 32
d_conv: 4
chunk_size: 64
dropout: 0.1

# Backend settings
# options: "auto", "cute", "reference"
scan_backend: "cute"
